# Site settings
title: Avinash Kumar
email: kumaravinashinbox@gmail.com
description: >-
  Backend engineering deep dives on distributed systems, data-intensive applications, and software architecture.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://akisonlyforu.com" # the base hostname & protocol for your site
date_format: "%b %-d, %Y"

# Google services
google_verification:
# Use either direct GA implementation or set up GTM account
# - using both will skew your data (leave blank to not use at all)
google_analytics: G-ZR186VLCHC
google_tag_manager:
# Bing services
bing_verification:

# Optional features
show_related_posts: True
show_subscribe_cta: True
show_social_icons: true
show_sharing_icons: true
show_comments: true
show_post_stats: true
author:
  name: Avinash Kumar
  twitter: akisonlyforu

# Giscus comments (GitHub Discussions)
giscus:
  repo: akisonlyforu/akisonlyforu.github.io
  repo_id: "MDEwOlJlcG9zaXRvcnkxNDIwODI2Njc="
  category: Announcements
  category_id: "DIC_kwDOCHgCa84DBBjp"

# Views/votes counters (Cloudflare Worker + D1)
counters_api: "https://metrics.akisonlyforu.com"
extended_fonts: false
enable_anchorjs: true

# Social icons
github_username: akisonlyforu
twitter_username: akisonlyforu
linkedin_username: akisonlyforu

# SEO / Social (used by jekyll-seo-tag)
twitter:
  username: akisonlyforu
  card: summary_large_image

social:
  name: Avinash Kumar
  links:
    - https://twitter.com/akisonlyforu
    - https://github.com/akisonlyforu
    - https://linkedin.com/in/akisonlyforu

logo: /images/site-logo.svg

defaults:
  - scope:
      path: ""
    values:
      image: /images/site-og-image.png
  - scope:
      path: ""
      type: "posts"
    values:
      image: /images/site-og-image.png
  - scope:
      path: ""
      type: "thoughts"
    values:
      image: /images/site-og-image.png
  # These are intentionally navigable in the site but are incomplete practice
  # prompts, so they should not compete with the finished interview guides.
  - scope:
      path: "interview/low-level-design/problems"
    values:
      meta_robots: "noindex, follow"
      sitemap: false

text:
  pagination:
    newer: "Newer"
    older: "Older"
  post:
    updated: "Updated"
    minute_read: "minute read"
    related_posts: "More to read"
  index:
    coming_soon: "Coming soon..."
  og_locale: "en_US"

# Build settings
future: true
theme: null
markdown: kramdown
permalink: /blog/:title/
paginate: 12
paginate_path: "/blog/:num/"
sass:
  compressed: true
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
# https://github.com/jekyll/jekyll/issues/2938
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git/
  - .github/
  - README.md
  - workers/
  - content-studio/

collections_dir: collections
collections:
  portfolio:
    output: true
  posts: {}
  thoughts:
    output: true
    permalink: /:collection/:title/

# Substack settings
substack_home_url: https://akisonlyforu.substack.com

# AdSense Settings (set to true once approved)
adsense_enabled: true
adsense_publisher_id: "ca-pub-6123691612469211"
