<div class="pagination clearfix mb1">
  <div class="left">
    {% if paginator.previous_page %}
      {% if paginator.page == 2 %}
        <a href="{{ site.baseurl }}/blog/" rel="prev" aria-label="Newer posts" title="Newer posts">
          <span class="left-circle-arrow"></span>
          <span class="pagination-label">Newer posts</span>
        </a>
      {% else %}
        <a href="{{ paginator.previous_page_path }}" rel="prev" aria-label="Newer posts" title="Newer posts">
          <span class="left-circle-arrow"></span>
          <span class="pagination-label">Newer posts</span>
        </a>
      {% endif %}
    {% endif %}
  </div>
  <div class="right">
    {% if paginator.next_page %}
      <a href="{{ paginator.next_page_path }}" rel="next" aria-label="Older posts" title="Older posts">
        <span class="right-circle-arrow"></span>
        <span class="pagination-label">Older posts</span>
      </a>
    {% endif %}
  </div>
</div>

<style>
a {
  display: inline-block;
  border-radius: 50%;
}

.left-circle-arrow {
  background: #000;
  display: inline-block;
  width: 4em;
  height: 4em;
  border: 0.5em solid #000;
  border-radius: 50%;
  margin-right: 1.5em;
  transition: all .2s ease-in-out;
}

.left-circle-arrow:after {
  content: '';
	display: inline-block;
  margin-top: .2em;
  margin-right: -1.5em;
  width: 3.5em;
  height: 3.5em;
  border-bottom: 0.3em solid #fff;
  border-left: 0.3em solid #fff;
  -moz-transform: rotate(45deg);
  -webkit-transform: rotate(45deg);
  transform: rotate(45deg);
}

.left-circle-arrow:hover {
  transform: scale(1.1);
}


.right-circle-arrow {
  background: black;
  display: inline-block;
  width: 4em;
  height: 4em;
  border: 0.5em solid #000;
  border-radius: 50%;
  margin-left: 1.5em;
  transition: all .2s ease-in-out;
}

.right-circle-arrow:after {
  content: '';
	display: inline-block;
  margin-top: .2em;
  margin-left: -1.5em;
  width: 3.5em;
  height: 3.5em;
  border-top: 0.3em solid #fff;
  border-right: 0.3em solid #fff;
  -moz-transform: rotate(45deg);
  -webkit-transform: rotate(45deg);
  transform: rotate(45deg);
}

.right-circle-arrow:hover {
  transform: scale(1.1);
}

</style>

<style>
.pagination-label {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>
