<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body class="site">
  {% include header.html %}
  <div class="site-wrap">
    <div class="post p2 p-responsive wrap" role="main">
      <div class="measure">
        {{ content }}
      </div>
    </div>
  </div>
  
  {% include footer.html %}
  <script src="{{ "/assets/js/blog-enhancements.js" | prepend: site.baseurl }}?{{ site.time | date: "%Y%m%d%H%M" }}"></script>
  <script>
  // Global "/" shortcut to focus search
  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      var tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;
      var searchInput = document.getElementById('search-input');
      if (searchInput) {
        e.preventDefault();
        searchInput.focus();
      } else {
        e.preventDefault();
        window.location.href = '/search/';
      }
    }
  });
  </script>
</body>
</html>

<style>
.site {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.site-wrap {
  flex: 1 0 auto;
}

.post {
  margin: 0 auto;
  max-width: 1200px;
  padding: 0 1rem;
}

.measure {
  margin: 0 auto;
  max-width: 800px;
}
</style>
