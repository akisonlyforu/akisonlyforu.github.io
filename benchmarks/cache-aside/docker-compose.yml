services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cache_bench
      POSTGRES_USER: cache_bench
      POSTGRES_PASSWORD: cache_bench
    command:
      - postgres
      - -c
      - max_connections=100
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cache_bench -d cache_bench"]
      interval: 1s
      timeout: 3s
      retries: 30
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

