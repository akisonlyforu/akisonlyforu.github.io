# A single digest-pinned memcached, for a quick manual poke:
#   docker compose up -d --wait     # memcached on 127.0.0.1:11311
#   echo -e 'stats slabs\r' | nc 127.0.0.1 11311
#   docker compose down -v
#
# The real experiments do NOT use this file. benchmark.py needs a different set
# of flags per experiment (-m, -f, -o slab_automove=...), so it drives `docker run`
# directly against the same pinned digest. This service just documents the image
# and the loopback-only port convention.
services:
  memcached:
    image: memcached:1.6@sha256:dc561d52bb8ad3c038867123ed2dc8357c4c128f047cdbd526cd65cf39408cbd
    command: ["memcached", "-m", "2048", "-f", "1.25"]
    ports:
      - "127.0.0.1:11311:11211"
    healthcheck:
      test: ["CMD-SHELL", "printf 'version\\r\\n' | timeout 1 cat >/dev/tcp/127.0.0.1/11211 || exit 1"]
      interval: 1s
      timeout: 3s
      retries: 30
