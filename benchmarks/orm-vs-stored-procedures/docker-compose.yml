services:
  postgres:
    # postgres:16 resolved to this digest at authoring time; pinned for reproducibility.
    image: postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.track_planning=on
      - -c
      - pg_stat_statements.max=10000
    ports:
      # loopback-only, non-default port to avoid clashing with a local postgres
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
