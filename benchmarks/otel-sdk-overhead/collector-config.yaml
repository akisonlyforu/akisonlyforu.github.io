receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 64

exporters:
  # Cheap sink: the app-side SDK cost is what we measure, not what the
  # collector does with the spans. `debug` at basic verbosity is effectively
  # a nop drain that still counts what it received.
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
