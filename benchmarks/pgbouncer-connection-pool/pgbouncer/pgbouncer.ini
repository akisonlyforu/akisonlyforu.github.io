[databases]
; One logical database, pointed at the Postgres service. No password needed on
; the server side because Postgres runs with trust auth in this harness.
bench = host=postgres port=5432 dbname=bench user=bench

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

; trust: accept any client without a password check. Matches the Postgres side.
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

; The whole point of the WITH case: transaction pooling. A server backend is
; assigned to a client only for the life of a transaction, then handed back.
pool_mode = transaction

; Accept a large fan-out of clients...
max_client_conn = 1000
; ...while keeping only a small number of real Postgres backends per (db,user).
default_pool_size = 10

admin_users = bench
ignore_startup_parameters = extra_float_digits

; Return idle server backends to Postgres quickly. Keeps the warm pool from one
; experiment out of the next one's measurements on this low max_connections box.
server_idle_timeout = 5
