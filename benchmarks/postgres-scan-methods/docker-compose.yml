services:
  postgres:
    image: postgres:16.14@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
    environment:
      POSTGRES_DB: scan_bench
      POSTGRES_USER: scan_bench
      POSTGRES_PASSWORD: scan_bench
    shm_size: 1gb
    command:
      - postgres
      - -c
      - track_io_timing=on
      - -c
      - max_connections=20
    ports:
      - "127.0.0.1:55434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scan_bench -d scan_bench"]
      interval: 1s
      timeout: 3s
      retries: 60
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
