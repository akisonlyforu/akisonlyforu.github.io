# Shared config for all three cluster nodes (rmq0/rmq1/rmq2), used by both the
# 3.13 (mirrored) and 4.0 (quorum) compose files.
#
# classic_config peer discovery: every node is told the full member list up front,
# so clustering is deterministic and doesn't depend on discovery races. Combined
# with a shared RABBITMQ_ERLANG_COOKIE (set in the compose files) the three nodes
# form one cluster on first boot.
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rmq0
cluster_formation.classic_config.nodes.2 = rabbit@rmq1
cluster_formation.classic_config.nodes.3 = rabbit@rmq2
cluster_formation.discovery_retry_limit = 30
cluster_formation.discovery_retry_interval = 2000

# We fail nodes with `docker kill` (a crash), not a network partition, so there is
# no split brain to arbitrate. `ignore` keeps a surviving minority node UP and
# still accepting AMQP connections, which is exactly what experiment C needs: we
# want to watch the quorum queue itself refuse to confirm when it loses majority,
# not have the whole node pause underneath us.
cluster_partition_handling = ignore

# Detect a killed peer in ~10s instead of the 60s default, so failover experiments
# run quickly and deterministically.
net_ticktime = 10

# Let the guest user connect over the (loopback-bound) TCP ports.
loopback_users = none
