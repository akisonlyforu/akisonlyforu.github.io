# RabbitMQ 4.0 broker for the publisher-confirm in-flight window benchmark.
# Digest-pinned, multi-arch (native on arm64). Bound to loopback on non-default
# host ports (6672 AMQP, 16672 management) so it doesn't clash with a local broker.
#
# The broker sits on a named docker network (rmq-confirms-net) so the PerfTest
# load-generator container can reach it by service name (rabbitmq:5672) instead
# of going back out through the published loopback port.
services:
  rabbitmq:
    image: rabbitmq:4.0-management@sha256:ad4268113c27d02f08ac1151f9651d6e475c955f81c3a5ad522b79955ce11cf3
    hostname: pcx-bench
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "127.0.0.1:6672:5672"     # AMQP
      - "127.0.0.1:16672:15672"   # management HTTP API
    networks:
      - rmq-confirms-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 10s
      retries: 30
      start_period: 20s

networks:
  rmq-confirms-net:
    name: rmq-confirms-net
