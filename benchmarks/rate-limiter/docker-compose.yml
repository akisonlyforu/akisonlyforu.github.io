services:
  redis-primary:
    image: redis:7
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - noeviction
      - --repl-diskless-sync-delay
      - "0"
    ports:
      - "56380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis-replica:
    image: redis:7
    command:
      - redis-server
      - --replicaof
      - redis-primary
      - "6379"
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - noeviction
    depends_on:
      redis-primary:
        condition: service_healthy
    ports:
      - "56381:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 30
