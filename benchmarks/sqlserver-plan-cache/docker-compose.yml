# SQL Server 2022, pinned by digest. amd64-only image; runs under emulation on
# arm64 hosts (fine for this). SA password is a throwaway for a local benchmark.
services:
  mssql:
    image: mcr.microsoft.com/mssql/server@sha256:ba4c8329f48fb8f02e1416be6a930ebfd71268caee78aa985f3af4315e457c89
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng_P@ssw0rd!"
      MSSQL_PID: "Developer"
    ports:
      - "127.0.0.1:11433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
